    <script>
      (function () {
        try {
          var cache = JSON.parse(sessionStorage.getItem('colorCache') || 'null');
          if (!cache) return;
          var id = new URLSearchParams(window.location.search).get('id');
          var colors = cache[id];
          if (!colors) return;
          var root = document.documentElement.style;
          root.setProperty('--section-accent', colors[0]);
          root.setProperty('--section-accent-secondary', colors[1]);
          root.setProperty('--section-accent-tertiary', colors[2]);
        } catch (e) {}
      })();
    </script>
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"
    ></script>
    <script type="module" src="js/app/main.js"></script>
  </head>
  <body class="scanlines">
    <div id="page-loader" style="position:fixed;inset:0;z-index:99999;background:#050505;display:flex;align-items:center;justify-content:center">
      <div class="loading" style="border:none;padding:0" id="loader-text">Loading</div>
    </div>
    <script>var _ld=new URLSearchParams(window.location.search).get('locale');try{_ld=_ld||localStorage.getItem('locale')}catch(e){}_ld=_ld||navigator.language;document.getElementById('loader-text').textContent=_ld.startsWith('es')?'Cargando':'Loading'</script>
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
    <div class="noise"></div>
    <div class="grid-bg"></div>

    <header class="header">
      <a href="index.html" class="logo">Ashel</a>
      <div class="header-right">
        <ul class="nav-links">
          <li><a href="index.html#projects" data-i18n="nav.projects">Projects</a></li>
          <li><a href="index.html#gallery" data-i18n="nav.gallery">Gallery</a></li>
          <li><a href="index.html#about" data-i18n="nav.about">About</a></li>
          <li><a href="index.html#contact" data-i18n="nav.contact">Contact</a></li>
        </ul>
        <div class="lang-toggle" id="lang-toggle">
          <span class="lang-option" data-lang="en">EN</span>
          <span class="lang-separator">|</span>
          <span class="lang-option" data-lang="es">ES</span>
        </div>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main id="project-content"></main>

    <footer class="footer">
      <p>&copy; 2026 Ashel</p>
      <p data-i18n="site.builtWith">Built with obsession</p>
    </footer>
    <script>
      (function () {
        var d = document.querySelector('.cursor-dot'),
          r = document.querySelector('.cursor-ring');
        if (!d || !r) return;
        document.addEventListener('mousemove', function (e) {
          d.style.transform = 'translate(' + (e.clientX - 3) + 'px,' + (e.clientY - 3) + 'px)';
          r.style.transform = 'translate(' + (e.clientX - 15) + 'px,' + (e.clientY - 15) + 'px)';
        });
      })();
    </script>
  </body>
