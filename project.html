<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | Ashel</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  </head>
  <body class="scanlines">
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
    <div class="noise"></div>
    <div class="grid-bg"></div>

    <header class="header">
      <a href="index.html" class="logo">Ashel</a>
      <div class="header-right">
        <ul class="nav-links">
          <li><a href="index.html#projects" data-i18n="nav.projects">Projects</a></li>
          <li><a href="index.html#gallery" data-i18n="nav.gallery">Gallery</a></li>
          <li><a href="index.html#about" data-i18n="nav.about">About</a></li>
          <li><a href="index.html#contact" data-i18n="nav.contact">Contact</a></li>
        </ul>
        <div class="lang-toggle" id="lang-toggle">
          <span class="lang-option" data-lang="en">EN</span>
          <span class="lang-separator">|</span>
          <span class="lang-option" data-lang="es">ES</span>
        </div>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main id="project-content">
      <div class="loading" data-i18n="site.loading">Loading</div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Ashel</p>
      <p data-i18n="site.builtWith">Built with obsession</p>
    </footer>

    <script>
      const params = new URLSearchParams(window.location.search);
      const browserLang = navigator.language.startsWith('es') ? 'es' : 'en';
      let currentLocale = params.get('locale') || localStorage.getItem('locale') || browserLang;
      let i18nData = null;
      let siteData = null;
      let currentProject = null;

      function applyTranslations() {
        if (!i18nData) return;
        const t = i18nData[currentLocale] || i18nData.en;
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.dataset.i18n;
          const keys = key.split('.');
          let value = t;
          for (const k of keys) {
            value = value?.[k];
          }
          if (typeof value === 'string') el.textContent = value;
        });
        document.querySelectorAll('.lang-option').forEach((opt) => {
          opt.classList.toggle('active', opt.dataset.lang === currentLocale);
        });
        document.documentElement.lang = currentLocale;
      }

      function renderContent() {
        if (!i18nData || !siteData || !currentProject) return;
        const t = i18nData[currentLocale] || i18nData.en;
        const project = currentProject;
        const projT = t.projects?.[project.id] || {};

        const genresHtml = project.genres
          .map((g) => `<span class="genre-tag">${g}</span>`)
          .join('');
        const membersHtml = project.members
          .map((m) => `<li><strong>${m.name}</strong> — ${projT.members?.[m.name] || m.role}</li>`)
          .join('');
        const linksHtml = project.links
          .map((l) => `<a href="${l.url}" target="_blank" class="btn-small">${l.label}</a>`)
          .join('');
        const descriptionHtml = (projT.description || project.description)
          .map((p) => `<p class="detail-description">${p}</p>`)
          .join('');

        function renderFeatured(release) {
          if (!release) return '';
          const desc = projT.releases?.[release.name] || release.description;
          return `
          <section class="featured-release" id="featured-section">
            <div class="section-label" style="border: none; padding: 0; margin-bottom: 2rem;">
              <span>${t.site?.featuredRelease || 'Featured Release'}</span>
              <span class="count">${release.year}</span>
            </div>
            <h2>${t.site?.nowPlaying || 'Now Playing'}</h2>
            <h3>${release.name}</h3>
            ${desc ? `<p>${desc}</p>` : ''}
            ${release.embed ? `<div class="detail-player-section"><iframe src="${release.embed}" height="450" frameborder="0"></iframe></div>` : ''}
          </section>`;
        }

        const defaultFeatured = project.releases.find((r) => r.featured) || project.releases[0];

        const selectorHtml =
          project.releases.length > 1
            ? `
        <div class="album-selector-wrap">
          <label>${t.site?.albumLabel || 'Album'}</label>
          <select id="album-selector">
            ${project.releases.map((r) => `<option value="${r.name}" ${r === defaultFeatured || r.name === defaultFeatured.name ? 'selected' : ''}>${r.name} (${r.year})</option>`).join('')}
          </select>
        </div>`
            : '';

        const releasesHtml = project.releases
          .map(
            (r) => `
        <a href="${r.url}" target="_blank" class="album-card">
          <img src="${r.cover}" alt="${r.name}" class="album-cover" loading="lazy">
          <div class="album-info">
            <span class="album-type">${r.type}</span>
            <p class="album-name">${r.name}</p>
            <p class="album-year">${r.year}</p>
          </div>
        </a>`
          )
          .join('');

        document.getElementById('project-content').innerHTML = `
        <section class="detail-header">
          <a href="index.html#projects" class="back-link">&larr; ${t.site?.backToProjects || 'Back to Projects'}</a>
          <div class="detail-hero">
            <img src="${project.cover}" alt="${project.name}" class="detail-cover">
            <div class="detail-info">
              <h1>${project.name}</h1>
              <div class="detail-genres">${genresHtml}</div>
              <p class="detail-location">${t.labels?.location || 'Location'}: ${project.location}</p>
              ${descriptionHtml}
              ${selectorHtml}
              <div class="detail-members">
                <h3>${t.labels?.members || 'Members'}</h3>
                <ul class="member-list">${membersHtml}</ul>
              </div>
              <div class="detail-links">${linksHtml}</div>
            </div>
          </div>
        </section>

        <section class="discography">
          <div class="section-label" style="border: none; padding: 0; margin-bottom: 2rem;">
            <span>${t.site?.discography || 'Discography'}</span>
            <span class="count">${String(project.releases.length).padStart(2, '0')}</span>
          </div>
          <div class="discography-grid">${releasesHtml}</div>
        </section>

        ${renderFeatured(defaultFeatured)}`;

        document.querySelectorAll('a, button, .album-card').forEach(attachCursor);

        const selector = document.getElementById('album-selector');
        selector?.addEventListener('change', () => {
          const selected = project.releases.find((r) => r.name === selector.value);
          const section = document.getElementById('featured-section');
          if (section && selected) {
            section.outerHTML = renderFeatured(selected);
          }
        });

        const colorThief = new ColorThief();
        fetch(project.cover)
          .then((res) => res.blob())
          .then((blob) => {
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
              const dominant = colorThief.getColor(img);
              const palette = colorThief.getPalette(img, 8);
              const vibrant = palette.filter((c) => {
                const max = Math.max(...c);
                const min = Math.min(...c);
                const brightness = (c[0] + c[1] + c[2]) / 3;
                const saturation = max === 0 ? 0 : (max - min) / max;
                return brightness > 40 && brightness < 220 && saturation > 0.2;
              });
              const sorted = vibrant.length > 0 ? vibrant : palette;
              const c1 = `#${dominant[0].toString(16).padStart(2, '0')}${dominant[1].toString(16).padStart(2, '0')}${dominant[2].toString(16).padStart(2, '0')}`;
              const c2 = sorted[1]
                ? `#${sorted[1][0].toString(16).padStart(2, '0')}${sorted[1][1].toString(16).padStart(2, '0')}${sorted[1][2].toString(16).padStart(2, '0')}`
                : c1;
              const c3 = sorted[2]
                ? `#${sorted[2][0].toString(16).padStart(2, '0')}${sorted[2][1].toString(16).padStart(2, '0')}${sorted[2][2].toString(16).padStart(2, '0')}`
                : c1;
              document.documentElement.style.setProperty('--section-accent', c1);
              document.documentElement.style.setProperty('--section-accent-secondary', c2);
              document.documentElement.style.setProperty('--section-accent-tertiary', c3);
              URL.revokeObjectURL(url);
            };
            img.src = url;
          });
      }

      function setLocale(lang) {
        currentLocale = lang;
        localStorage.setItem('locale', lang);
        const url = new URL(window.location);
        url.searchParams.set('locale', lang);
        window.history.replaceState({}, '', url);
        applyTranslations();
        renderContent();
      }

      document.querySelectorAll('.lang-option').forEach((opt) => {
        opt.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          setLocale(opt.dataset.lang);
        });
      });

      const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
      const navLinks = document.querySelector('.nav-links');

      mobileMenuBtn?.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        mobileMenuBtn.classList.toggle('active');
      });

      document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute('href'));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
            navLinks.classList.remove('active');
            mobileMenuBtn.classList.remove('active');
          }
        });
      });

      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');
      let mouseX = 0,
        mouseY = 0;
      let ringX = 0,
        ringY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.transform = `translate(${mouseX - 3}px, ${mouseY - 3}px)`;
      });

      function animateRing() {
        ringX += (mouseX - ringX) * 0.15;
        ringY += (mouseY - ringY) * 0.15;
        ring.style.transform = `translate(${ringX - 18}px, ${ringY - 18}px)`;
        requestAnimationFrame(animateRing);
      }
      animateRing();

      function attachCursor(el) {
        const accent =
          getComputedStyle(document.documentElement).getPropertyValue('--section-accent').trim() ||
          '#ff2d55';
        const accentSec =
          getComputedStyle(document.documentElement)
            .getPropertyValue('--section-accent-secondary')
            .trim() || '#5856d6';
        el.addEventListener('mouseenter', () => {
          ring.style.width = '60px';
          ring.style.height = '60px';
          ring.style.borderColor = accentSec;
        });
        el.addEventListener('mouseleave', () => {
          ring.style.width = '36px';
          ring.style.height = '36px';
          ring.style.borderColor = accent;
        });
      }

      const projectId = params.get('id');

      if (!projectId) {
        window.location.href = 'index.html';
      }

      Promise.all([
        fetch('data.json').then((r) => r.json()),
        fetch('assets/i18n.json', { cache: 'no-store' }).then((r) => r.json()),
      ])
        .then(([data, i18nRes]) => {
          i18nData = i18nRes;
          siteData = data;
          currentProject = data.projects.find((p) => p.id === projectId);
          applyTranslations();

          if (!currentProject) {
            const t = i18nData?.[currentLocale] || i18nData?.en || {};
            document.getElementById('project-content').innerHTML = `
            <div class="container" style="padding-top: 120px; text-align: center;">
              <a href="index.html#projects" class="back-link">&larr; ${t.site?.backToProjects || 'Back to Projects'}</a>
              <h1>${t.site?.notFound || 'Project not found'}</h1>
            </div>`;
            return;
          }

          document.title = `${currentProject.name} | Ashel`;
          renderContent();
        })
        .catch((err) => {
          document.getElementById('project-content').innerHTML = `
          <div class="loading">Error loading data</div>`;
          console.error(err);
        });
    </script>
  </body>
</html>
