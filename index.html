<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashel</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script type="module" src="js/app/main.js"></script>
  </head>
  <body class="scanlines">
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
    <div class="noise"></div>
    <div class="grid-bg"></div>

    <header class="header">
      <a href="#" class="logo">Ashel</a>
      <div class="header-right">
        <ul class="nav-links">
          <li><a href="#projects" data-i18n="nav.projects">Projects</a></li>
          <li><a href="#gallery" data-i18n="nav.gallery">Gallery</a></li>
          <li><a href="#about" data-i18n="nav.about">About</a></li>
          <li><a href="#contact" data-i18n="nav.contact">Contact</a></li>
        </ul>
        <div class="lang-toggle" id="lang-toggle">
          <span class="lang-option" data-lang="en">EN</span>
          <span class="lang-separator">|</span>
          <span class="lang-option" data-lang="es">ES</span>
        </div>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main>
      <section class="hero">
        <canvas id="wave-canvas"></canvas>
        <div class="hero-bubbles" id="hero-bubbles"></div>
        <div class="hero-content">
          <h1 class="hero-title">
            <span class="line"><span>Ashel</span></span>
          </h1>
          <p class="hero-tagline" id="hero-tagline"></p>
        </div>
        <div class="hero-scroll"><span data-i18n="site.scrollHint">Scroll</span> ↓</div>
      </section>

      <div class="marquee">
        <div class="marquee-content" id="marquee"></div>
      </div>

      <section id="projects">
        <div class="section-label">
          <span data-i18n="labels.projectsSection">Projects / Bands</span>
          <span class="count" id="project-count"></span>
        </div>
        <div class="projects-list" id="projects-grid"></div>
      </section>

      <section id="gallery">
        <div class="section-label">
          <span data-i18n="labels.galleryLabel">Gallery</span>
          <span class="count">06</span>
        </div>
        <div class="gallery-grid" id="gallery-grid"></div>
      </section>

      <section id="about">
        <div class="section-label">
          <span data-i18n="labels.aboutLabel">About</span>
          <span class="count">001</span>
        </div>
        <div class="about">
          <div class="about-image">
            <img src="assets/images/about.jpg" alt="Ashel" loading="lazy" />
          </div>
          <div class="about-content" id="about-text"></div>
        </div>
      </section>

      <section id="contact" class="contact">
        <div class="section-label" style="border-bottom: none; padding-bottom: 0">
          <span data-i18n="labels.contactLabel">Contact / Links</span>
          <span class="count">∞</span>
        </div>
        <p class="contact-subtitle" data-i18n="labels.emailDesc">
          For collaborations, bookings, or just to say hi
        </p>
        <div class="social-links" id="social-links"></div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Ashel</p>
      <p data-i18n="site.builtWith">Built with obsession</p>
    </footer>
  </body>
</html>
