<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashel</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components/cursor.css" />
    <link rel="stylesheet" href="css/components/nav.css" />
    <link rel="stylesheet" href="css/components/project-card.css" />
    <link rel="stylesheet" href="css/components/gallery.css" />
    <link rel="stylesheet" href="css/components/about.css" />
    <link rel="stylesheet" href="css/components/contact.css" />
    <link rel="stylesheet" href="css/components/album-card.css" />
    <link rel="stylesheet" href="css/components/discography.css" />
    <link rel="stylesheet" href="css/components/featured-player.css" />
    <link rel="stylesheet" href="css/components/detail.css" />
    <link rel="stylesheet" href="css/effects.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"
    ></script>
    <script type="module" src="js/app/main.js"></script>
  </head>
  <body class="scanlines">
    <div id="page-loader" style="position:fixed;inset:0;z-index:99999;background:#050505;display:flex;align-items:center;justify-content:center">
      <div class="loading" style="border:none;padding:0" id="loader-text">Loading</div>
    </div>
    <script>var _ld=new URLSearchParams(window.location.search).get('locale');try{_ld=_ld||localStorage.getItem('locale')}catch(e){}_ld=_ld||navigator.language;document.getElementById('loader-text').textContent=_ld.startsWith('es')?'Cargando':'Loading'</script>
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
    <div class="noise"></div>
    <div class="grid-bg"></div>

    <header class="header">
      <a href="#" class="logo">Ashel</a>
      <div class="header-right">
        <ul class="nav-links">
          <li><a href="#projects" data-i18n="nav.projects">Projects</a></li>
          <li><a href="#gallery" data-i18n="nav.gallery">Gallery</a></li>
          <li><a href="#about" data-i18n="nav.about">About</a></li>
          <li><a href="#contact" data-i18n="nav.contact">Contact</a></li>
        </ul>
        <div class="lang-toggle" id="lang-toggle">
          <span class="lang-option" data-lang="en">EN</span>
          <span class="lang-separator">|</span>
          <span class="lang-option" data-lang="es">ES</span>
        </div>
      </div>
      <button class="mobile-menu-btn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main>
      <section class="hero">
        <canvas id="wave-canvas"></canvas>
        <div class="hero-bubbles" id="hero-bubbles"></div>
        <div class="hero-content">
          <h1 class="hero-title">
            <span class="line"><span>Ashel</span></span>
          </h1>
          <p class="hero-tagline" id="hero-tagline"></p>
        </div>
        <div class="hero-scroll"><span data-i18n="site.scrollHint">Scroll</span> ↓</div>
      </section>

      <div class="marquee">
        <div class="marquee-content" id="marquee"></div>
      </div>

      <section id="projects">
        <div class="section-label">
          <span data-i18n="labels.projectsSection">Projects / Bands</span>
          <span class="count" id="project-count"></span>
        </div>
        <div class="projects-list" id="projects-grid"></div>
      </section>

      <section id="gallery">
        <div class="section-label">
          <span data-i18n="labels.galleryLabel">Gallery</span>
          <span class="count" id="gallery-count">00</span>
        </div>
        <div class="gallery-grid" id="gallery-grid"></div>
      </section>

      <section id="about">
        <div class="section-label">
          <span data-i18n="labels.aboutLabel">About</span>
          <span class="count">001</span>
        </div>
        <div class="about">
          <div class="about-image">
            <img src="assets/images/about.jpg" alt="Ashel" loading="lazy" decoding="async" />
          </div>
          <div class="about-content" id="about-text"></div>
        </div>
      </section>

      <section id="contact" class="contact">
        <div class="section-label" style="border-bottom: none; padding-bottom: 0">
          <span data-i18n="labels.contactLabel">Contact / Links</span>
          <span class="count">∞</span>
        </div>
        <p class="contact-subtitle" data-i18n="labels.emailDesc">
          For collaborations, bookings, or just to say hi
        </p>
        <div class="social-links" id="social-links"></div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Ashel</p>
      <p data-i18n="site.builtWith">Built with obsession</p>
    </footer>
    <script>
      (function () {
        var d = document.querySelector('.cursor-dot'),
          r = document.querySelector('.cursor-ring');
        if (!d || !r) return;
        document.addEventListener('mousemove', function (e) {
          d.style.transform = 'translate(' + (e.clientX - 3) + 'px,' + (e.clientY - 3) + 'px)';
          r.style.transform = 'translate(' + (e.clientX - 15) + 'px,' + (e.clientY - 15) + 'px)';
        });
      })();
    </script>
  </body>
</html>
