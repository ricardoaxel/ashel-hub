<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashel</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
</head>
<body class="scanlines">
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
  <div class="noise"></div>
  <div class="grid-bg"></div>

  <header class="header">
    <a href="#" class="logo">Ashel</a>
    <ul class="nav-links">
      <li><a href="#projects">Projects</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="mobile-menu-btn" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <main>
    <section class="hero">
      <canvas id="wave-canvas"></canvas>
      <div class="hero-bubbles" id="hero-bubbles"></div>
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="line"><span>Ashel</span></span>
        </h1>
        <p class="hero-tagline" id="hero-tagline"></p>
      </div>
      <div class="hero-scroll">
        <span>Scroll ↓</span>
      </div>
    </section>

    <div class="marquee">
      <div class="marquee-content" id="marquee">
      </div>
    </div>

    <section id="projects">
      <div class="section-label">
        <span>Projects / Bands</span>
        <span class="count" id="project-count"></span>
      </div>
      <div class="projects-list" id="projects-grid">
      </div>
    </section>

    <section id="gallery">
      <div class="section-label">
        <span>Gallery</span>
        <span class="count">06</span>
      </div>
      <div class="gallery-grid" id="gallery-grid">
      </div>
    </section>

    <section id="about">
      <div class="section-label">
        <span>About</span>
        <span class="count">001</span>
      </div>
      <div class="about">
        <div class="about-image">
          <img src="assets/images/about.jpg" alt="Ashel" loading="lazy">
        </div>
        <div class="about-content" id="about-text">
        </div>
      </div>
    </section>

    <section id="contact" class="contact">
      <div class="section-label" style="border-bottom: none; padding-bottom: 0;">
        <span>Contact / Links</span>
        <span class="count">∞</span>
      </div>
      <p class="contact-subtitle">For collaborations, bookings, or just to say hi</p>
      <div class="social-links" id="social-links">
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Ashel</p>
    <p>Built with obsession</p>
  </footer>

  <script>
    const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
    const navLinks = document.querySelector('.nav-links');

    mobileMenuBtn?.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      mobileMenuBtn.classList.toggle('active');
    });

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
          navLinks.classList.remove('active');
          mobileMenuBtn.classList.remove('active');
        }
      });
    });

    const dot = document.querySelector('.cursor-dot');
    const ring = document.querySelector('.cursor-ring');
    let mouseX = 0, mouseY = 0;
    let ringX = 0, ringY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      dot.style.transform = `translate(${mouseX - 3}px, ${mouseY - 3}px)`;
    });

    function animateRing() {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      ring.style.transform = `translate(${ringX - 18}px, ${ringY - 18}px)`;
      requestAnimationFrame(animateRing);
    }
    animateRing();

    function attachCursor(el) {
      const accent = getComputedStyle(document.documentElement).getPropertyValue('--section-accent').trim() || '#ff2d55';
      const accentSec = getComputedStyle(document.documentElement).getPropertyValue('--section-accent-secondary').trim() || '#5856d6';
      el.addEventListener('mouseenter', () => {
        ring.style.width = '60px';
        ring.style.height = '60px';
        ring.style.borderColor = accentSec;
      });
      el.addEventListener('mouseleave', () => {
        ring.style.width = '36px';
        ring.style.height = '36px';
        ring.style.borderColor = accent;
      });
    }

    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('hero-tagline').textContent = data.site.subtitle;

        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        let time = 0;
        let mouseX = 0.5;

        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('mousemove', (e) => {
          mouseX = e.clientX / window.innerWidth;
        });

        const bands = 128;
        const frequencies = new Float32Array(bands).fill(0);
        const targetFrequencies = new Float32Array(bands).fill(0);

        class Particle {
          constructor() {
            this.reset();
            this.y = Math.random() * canvas.height;
          }
          reset() {
            const cx = canvas.width / 2;
            const cy = canvas.height * 0.45;
            this.x = cx + (Math.random() - 0.5) * canvas.width * 0.6;
            this.y = cy + (Math.random() - 0.5) * canvas.height * 0.5;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3 - 0.1;
            this.radius = Math.random() * 2 + 0.5;
            this.opacity = Math.random() * 0.4 + 0.1;
            this.pulseSpeed = Math.random() * 0.02 + 0.01;
            this.pulsePhase = Math.random() * Math.PI * 2;
            this.colorIndex = Math.floor(Math.random() * 3);
          }
          update() {
            this.x += this.vx;
            this.y += this.vy;
            const cx = canvas.width / 2;
            const cy = canvas.height * 0.45;
            const dx = cx - this.x;
            const dy = cy - this.y;
            this.vx += dx * 0.00003;
            this.vy += dy * 0.00003;
            this.vx *= 0.999;
            this.vy *= 0.999;
            if (this.x < -20 || this.x > canvas.width + 20 || this.y < -20 || this.y > canvas.height + 20) {
              this.reset();
            }
          }
          draw(ctx, colors) {
            const pulse = Math.sin(time * this.pulseSpeed + this.pulsePhase) * 0.5 + 0.5;
            const r = this.radius * (0.8 + pulse * 0.4);
            const alpha = this.opacity * (0.6 + pulse * 0.4);
            const rgb = hexToRgb(colors[this.colorIndex]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, ${alpha})`;
            ctx.fill();
          }
        }

        let particles = [];
        function initParticles(count) {
          particles = [];
          for (let i = 0; i < count; i++) {
            particles.push(new Particle());
          }
        }
        initParticles(50);
        window.addEventListener('resize', () => {
          resizeCanvas();
          initParticles(50);
        });

        function generateNextFrame() {
          for (let i = 0; i < bands; i++) {
            const base = Math.sin(time * 0.02 + i * 0.1) * 0.3;
            const noise = (Math.random() - 0.5) * 0.2;
            const beat = Math.sin(time * 0.05) * 0.4 * (i < 20 ? 1 : 0.3);
            const harmonic = Math.sin(i * 0.3 + time * 0.03) * 0.2;
            const mouseInfluence = Math.sin(i * 0.05 + mouseX * Math.PI * 2) * 0.3;
            targetFrequencies[i] = Math.max(0, Math.min(1, base + noise + beat + harmonic + mouseInfluence + 0.5));
          }
        }

        function updateFrequencies() {
          for (let i = 0; i < bands; i++) {
            frequencies[i] += (targetFrequencies[i] - frequencies[i]) * 0.15;
          }
        }

        function hexToRgb(hex) {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return `${r}, ${g}, ${b}`;
        }

        function drawWaveform() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const centerY = canvas.height * 0.45;
          const amplitude = canvas.height * 0.25;

          ctx.globalCompositeOperation = 'lighter';

          const accent = getComputedStyle(document.documentElement).getPropertyValue('--section-accent').trim() || '#ff2d55';
          const accentSec = getComputedStyle(document.documentElement).getPropertyValue('--section-accent-secondary').trim() || '#5856d6';
          const accentTer = getComputedStyle(document.documentElement).getPropertyValue('--section-accent-tertiary').trim() || '#00d4aa';

          const colors = [accent, accentSec, accentTer];
          const opacities = [0.3, 0.2, 0.15];

          for (let layer = 0; layer < 3; layer++) {
            ctx.beginPath();
            const rgb = hexToRgb(colors[layer]);
            ctx.strokeStyle = `rgba(${rgb}, ${opacities[layer]})`;
            ctx.lineWidth = layer === 0 ? 2 : 1;

            const yShift = layer * 15;
            const phaseShift = layer * 0.5;

            for (let x = 0; x < canvas.width; x++) {
              const i = Math.floor((x / canvas.width) * bands);
              const freq = frequencies[i] || 0;
              const wave = Math.sin((x * 0.01) + time * 0.02 + phaseShift) * freq * amplitude;
              const y = centerY + yShift + wave;

              if (x === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }

            ctx.stroke();
          }

          ctx.globalCompositeOperation = 'source-over';

          particles.forEach(p => {
            p.update();
            p.draw(ctx, colors);
          });
        }

        function animate() {
          time++;
          generateNextFrame();
          updateFrequencies();
          drawWaveform();
          animationId = requestAnimationFrame(animate);
        }
        animate();

        const marqueeItems = data.projects.map(p =>
          `<span>${p.name} <span class="accent">—</span> ${p.genres.slice(0, 2).join(' / ')}</span>`
        ).join('');
        document.getElementById('marquee').innerHTML = marqueeItems + marqueeItems;

        document.getElementById('project-count').textContent = String(data.projects.length).padStart(2, '0');

        const projectsHtml = data.projects.map((p, i) => `
          <a href="project.html?id=${p.id}" class="project-card">
            <div class="project-cover-wrap">
              <img src="${p.cover}" alt="${p.name}" class="project-cover" loading="lazy">
              ${p.badge ? `<span class="project-badge">${p.badge}</span>` : ''}
            </div>
            <div class="project-info">
              <span class="project-number">${String(i + 1).padStart(2, '0')}</span>
              <h2 class="project-name">${p.name}</h2>
              <div class="project-genres">
                ${p.genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
              </div>
              <p class="project-desc">${p.shortDescription}</p>
              <span class="project-arrow">→</span>
            </div>
          </a>`).join('');
        document.getElementById('projects-grid').innerHTML = projectsHtml;

        const bubblesContainer = document.getElementById('hero-bubbles');
        const activeBubbles = [];
        const usedCovers = [];

        function getDimensions() {
          const hero = document.querySelector('.hero');
          return { w: hero.offsetWidth, h: hero.offsetHeight };
        }

        function getRandomCover() {
          const available = data.projects.filter(p => !usedCovers.includes(p.id));
          if (available.length === 0) return null;
          const p = available[Math.floor(Math.random() * available.length)];
          usedCovers.push(p.id);
          return p;
        }

        function createBubble(startOnScreen = false) {
          const project = getRandomCover();
          if (!project) return;

          const dim = getDimensions();
          const size = Math.random() * 70 + 30;
          const bubble = document.createElement('div');
          bubble.className = 'hero-bubble';
          bubble.style.width = `${size}px`;
          bubble.style.height = `${size}px`;

          const edge = Math.floor(Math.random() * 4);
          let startX, startY;

          if (edge === 0) { startX = Math.random() * dim.w; startY = -size; }
          else if (edge === 1) { startX = dim.w + size; startY = Math.random() * dim.h; }
          else if (edge === 2) { startX = Math.random() * dim.w; startY = dim.h + size; }
          else { startX = -size; startY = Math.random() * dim.h; }

          const targetX = dim.w * (0.2 + Math.random() * 0.6);
          const targetY = dim.h * (0.2 + Math.random() * 0.6);
          const speed = 0.1 + Math.random() * 0.4;
          const dist = Math.hypot(targetX - startX, targetY - startY);
          const vx = ((targetX - startX) / dist) * speed;
          const vy = ((targetY - startY) / dist) * speed;

          let x, y;
          if (startOnScreen) {
            const progress = 0.3 + Math.random() * 0.4;
            x = startX + ((targetX - startX) * progress);
            y = startY + ((targetY - startY) * progress);
          } else {
            x = startX;
            y = startY;
          }

          bubble.style.transform = `translate(${x}px, ${y}px)`;

          const img = document.createElement('img');
          img.src = project.cover;
          img.alt = '';
          img.loading = 'lazy';
          bubble.appendChild(img);
          bubblesContainer.appendChild(bubble);

          activeBubbles.push({ el: bubble, x, y, vx, vy, size });
        }

        for (let i = 0; i < data.projects.length; i++) createBubble(true);

        function animateBubbles() {
          const dim = getDimensions();
          const margin = 200;

          for (let i = activeBubbles.length - 1; i >= 0; i--) {
            const b = activeBubbles[i];
            b.x += b.vx;
            b.y += b.vy;

            const dist = Math.hypot(b.x - dim.w / 2, b.y - dim.h / 2);
            const maxDist = Math.max(dim.w, dim.h) * 0.6;
            const opacity = Math.max(0, Math.min(0.5, (1 - dist / maxDist) * 0.5));

            b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
            b.el.style.opacity = opacity;

            if (b.x < -margin - b.size || b.x > dim.w + margin || b.y < -margin - b.size || b.y > dim.h + margin) {
              b.el.remove();
              activeBubbles.splice(i, 1);
            }
          }

          requestAnimationFrame(animateBubbles);
        }
        requestAnimationFrame(animateBubbles);

        const galleryHtml = data.projects.map(p => `
          <div class="gallery-item" data-label="${p.name}">
            <img src="${p.cover}" alt="${p.name}" loading="lazy">
          </div>`).join('');
        document.getElementById('gallery-grid').innerHTML = galleryHtml;

        const aboutHtml = `
          <h3>Ashel</h3>
          ${data.site.bio.map(b => `<p>${b}</p>`).join('')}
          <div class="stats">
            ${data.site.stats.map(s => `
              <div class="stat">
                <span class="stat-number">${s.number}</span>
                <span class="stat-label">${s.label}</span>
              </div>`).join('')}
          </div>`;
        document.getElementById('about-text').innerHTML = aboutHtml;

        const socialHtml = data.site.social.map(s => `
          <a href="${s.url}" target="_blank">${s.label}</a>`).join('');
        document.getElementById('social-links').innerHTML = socialHtml;

        document.querySelectorAll('a, .project-card, .album-card, .gallery-item, button').forEach(attachCursor);

        const colorThief = new ColorThief();

        function extractColors(imageUrl) {
          return fetch(imageUrl)
            .then(res => res.blob())
            .then(blob => {
              const url = URL.createObjectURL(blob);
              return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                  try {
                    const palette = colorThief.getPalette(img, 16);

                    const analyzeColor = c => {
                      const max = Math.max(...c);
                      const min = Math.min(...c);
                      const brightness = (c[0] + c[1] + c[2]) / 3;
                      const saturation = max === 0 ? 0 : (max - min) / max;
                      return { r: c[0], g: c[1], b: c[2], brightness, saturation, score: saturation * 0.6 + (brightness > 80 && brightness < 200 ? 0.4 : 0) };
                    };

                    const analyzed = palette.map(analyzeColor).sort((a, b) => b.score - a.score);

                    let accent = analyzed[0];
                    if (accent.brightness < 80 && analyzed.length > 1) {
                      accent = analyzed.filter(c => c.brightness >= 60 && c.saturation > 0.25)[0] || analyzed[0];
                    }

                    const brighten = (c, factor) => {
                      let r = Math.min(255, Math.floor(c.r * factor));
                      let g = Math.min(255, Math.floor(c.g * factor));
                      let b = Math.min(255, Math.floor(c.b * factor));
                      return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
                    };

                    const factor = accent.brightness < 100 ? 1.4 : 1.25;
                    const c1 = brighten(accent, factor);

                    const secondary = analyzed.filter(c => Math.abs(c.score - accent.score) > 0.1 && c.brightness >= 50)[0] || analyzed[1] || accent;
                    const c2 = brighten(secondary, 1.3);

                    const tertiary = analyzed.filter(c => c !== secondary && Math.abs(c.score - secondary.score) > 0.05 && c.brightness >= 50)[0] || analyzed[2] || secondary;
                    const c3 = brighten(tertiary, 1.15);

                    URL.revokeObjectURL(url);
                    resolve([c1, c2, c3]);
                  } catch (e) { reject(e); }
                };
                img.onerror = reject;
                img.src = url;
              });
            });
        }

        const cards = document.querySelectorAll('.project-card');
        const items = document.querySelectorAll('.gallery-item');

        data.projects.forEach((project, index) => {
          extractColors(project.cover)
            .then(([c1, c2, c3]) => {
              const card = cards[index];
              if (card) {
                card.style.setProperty('--section-accent', c1);
                card.style.setProperty('--section-accent-secondary', c2);
                card.style.setProperty('--section-accent-tertiary', c3);

                const badge = card.querySelector('.project-badge');
                if (badge) badge.style.background = c1;

                const genres = card.querySelectorAll('.genre-tag');
                genres.forEach(g => { g.style.borderColor = c1; });
              }

              const item = items[index];
              if (item) {
                item.style.setProperty('--section-accent', c1);
                item.style.setProperty('--section-accent-secondary', c2);
              }
            })
            .catch(() => {
              if (project.accent) {
                const card = cards[index];
                if (card) {
                  card.style.setProperty('--section-accent', project.accent);
                  card.style.setProperty('--section-accent-secondary', project.accentSecondary || project.accent);
                  card.style.setProperty('--section-accent-tertiary', project.accentTertiary || project.accent);
                }
              }
            });
        });
      })
      .catch(err => console.error('Failed to load data:', err));
  </script>
</body>
</html>
